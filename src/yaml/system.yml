id: projectmoonttrpg
title: Project Moon TTRPG
description: The Project Moon TTRPG system for FoundryVTT!
version: "0.0.1"
compatibility:
  minimum: "13"
  verified: "14"
documentTypes:
  Actor:
    character: {}
    npc: {}
  Item:
    weapon: {}
    outfit: {}
    ammunition: {}
    tool: {}
    skill: {}
    effect: {}
    augment: {}
    status: {}
authors:
  - name: 'Leetram'
    discord: 'leetram'
  - name: 'Fetlach'
    discord: 'fetlach'
  - name: 'Derpete'
    discord: 'derpete'
  - name: 'Bullesta'
    discord: 'bullesta'
  - name: 'B Lightning'
    discord: 'b_lightning'
esmodules:
  - module/projectmoonttrpg.js
styles:
  - styles/lib/tagify.css
  - styles/dist/projectmoonttrpg.css
  - styles/lib/character-sheet.css
  - styles/dist/pm-sheet-inventory.css
  - styles/lib/npc-sheet.css
media:
  - type: setup
    url: "systems/projectmoonttrpg/assets/thumbnail.webp"
    thumbnail: "systems/projectmoonttrpg/assets/thumbnail.webp"
    loop: false
    flags: {}
scripts:
  - scripts/lib/tagify.min.js
packs:
  - name: status-pmttrpg-srd
    label: Status SRD
    path: packs/status-pmttrpg-srd
    type: Item
    private: false
  - name: effects-pmttrpg-srd
    label: Effects SRD
    path: packs/effects-pmttrpg-srd
    type: Item
    private: false
  - name: items-pmttrpg-srd
    label: Items SRD
    path: packs/items-pmttrpg-srd
    type: Item
    private: false
  - name: macro-pmttrpg-srd
    label: Macros SRD
    path: packs/macro-pmttrpg-srd
    type: Macro
    private: false
languages:
  - lang: en
    name: English
    path: lang/en.json
grid:
  distance: 1
  units: SQR
primaryTokenAttribute: attributes.hp
secondaryTokenAttribute: attributes.st
initiative: 1d6
socket: true
url: https://github.com/Leetram519/Project-Moon-TTRPG
manifest: https://storage.googleapis.com/pmttrpg_zip/0.0.1/system.json
download: https://storage.googleapis.com/pmttrpg_zip/0.0.1/projectmoonttrpg.zip
changelog: https://github.com/Leetram519/Project-Moon-TTRPG/blob/main/CHANGELOG.md
bugs: https://github.com/Leetram519/Project-Moon-TTRPG/issues
