PMTTRPG.Settings.noCompendiumAutoData.name: 'Exclude Project Moon TTRPG Compendim Data'
PMTTRPG.Settings.noCompendiumAutoData.hint: 'Exclude moves and classes from the items in the default Project Moon TTRPG compendia, for PMTTRPG hacks like Homebrew World that re-use the same class names'

PMTTRPG.Settings.compendiumPrefix.name: 'Compendium Prefix'
PMTTRPG.Settings.compendiumPrefix.hint: 'Auto-select moves and classes from compendiums with this prefix on their name, for PMTTRPG hacks like Homebrew World. For example if the setting is set to "HBW", the classes will be selected from a compendium named "HBW Classes" and moves for The Fighter will be selected from a compendium named "HBW The Fighter Moves". Leave blank to disable.'

PMTTRPG.Settings.noAbilityIncrease.name: 'No Ability Increase'
PMTTRPG.Settings.noAbilityIncrease.hint: 'No abiltiy score increase on level up, for PMTTRPG hacks like Homebrew World'

PMTTRPG.Settings.noConstitutionToHP.name: "Don't Add Constitution Score to HP"
PMTTRPG.Settings.noConstitutionToHP.hint: 'Used for PMTTRPG hacks like Homebrew World'

PMTTRPG.Settings.noSTRToMaxLoad.name: "Don't Add STR mod to Max Load"
PMTTRPG.Settings.noSTRToMaxLoad.hint: 'Used for PMTTRPG hacks like Homebrew World'

