PMTTRPG.the-barbarian.Bond1: _______________ is puny and foolish, but amusing to me.
PMTTRPG.the-barbarian.Bond2: "_______________ 's ways are strange and confusing."
PMTTRPG.the-barbarian.Bond3: _______________ is always getting into trouble - I must protect them from themselves.
PMTTRPG.the-barbarian.Bond4: _______________ shares my hunger for glory; the earth will tremble at our passing!
PMTTRPG.the-bard.Bond1: This is not my first adventure with _______________.
PMTTRPG.the-bard.Bond2: I sang stories of _______________ long before I ever met them in person.
PMTTRPG.the-bard.Bond3: _______________ is often the butt of my jokes.
PMTTRPG.the-bard.Bond4: I am writing a ballad about the adventures of _______________.
PMTTRPG.the-bard.Bond5: _______________ trusted me with a secret.
PMTTRPG.the-bard.Bond6: _______________ does not trust me, and for good reason.
PMTTRPG.the-cleric.Bond1: _______________ has insulted my deity; I do not trust them.
PMTTRPG.the-cleric.Bond2: _______________ is a good and faithful person; I trust them implicitly.
PMTTRPG.the-cleric.Bond3: _______________ is in constant danger, I will keep them safe.
PMTTRPG.the-cleric.Bond4: I am working on converting _______________ to my faith.
PMTTRPG.the-druid.Bond1: ____________________ smells more like prey than a hunter.
PMTTRPG.the-druid.Bond2: The spirits spoke to me of a great danger that follows ______________.
PMTTRPG.the-druid.Bond3: I have showed ________________ a secret rite of the Land.
PMTTRPG.the-druid.Bond4: ___________ has tasted my blood and I theirs. We are bound by it.
PMTTRPG.the-fighter.Bond1: _______________ owes me their life, whether they admit it or not.,
PMTTRPG.the-fighter.Bond2: I have sworn to protect _______________.,
PMTTRPG.the-fighter.Bond3: I worry about the ability of _______________ to survive in the dungeon.,
PMTTRPG.the-fighter.Bond4: _______________ is soft, but I will make them hard like me.
PMTTRPG.the-immolator.Bond1: ____________________ has felt the hellish touch of fire, now they know my strength.
PMTTRPG.the-immolator.Bond2: I will teach ______________ the true meaning of sacrifice.
PMTTRPG.the-immolator.Bond3: I cast something into the fire for ________________ and still owe them their due.
PMTTRPG.the-paladin.Bond1: _______________’s misguided behavior endangers their very soul!
PMTTRPG.the-paladin.Bond2: _______________ has stood by me in battle and can be trusted completely.
PMTTRPG.the-paladin.Bond3: I respect the beliefs of _______________ but hope they will someday see the true way.
PMTTRPG.the-paladin.Bond4: _______________ is a brave soul, I have much to learn from them.
PMTTRPG.the-thief.Bond1: I stole something from _______________.
PMTTRPG.the-thief.Bond2: _______________ has my back when things go wrong.
PMTTRPG.the-thief.Bond3: _______________ knows incriminating details about me.
PMTTRPG.the-thief.Bond4: _______________ and I have a con running.
PMTTRPG.the-wizard.Bond1: _______________ will play an important role in the events to come. I have foreseen it!,
PMTTRPG.the-wizard.Bond2: _______________ is keeping an important secret from me.,
PMTTRPG.the-wizard.Bond3: _______________ is woefully misinformed about the world; I will teach them all that I can.
PMTTRPG.the-ranger.Bond1: I have guided _______________ before and they owe me for it.
PMTTRPG.the-ranger.Bond2: _______________ is a friend of nature, so I will be their friend as well.
PMTTRPG.the-ranger.Bond3: _______________ has no respect for nature, so I have no respect for them.
PMTTRPG.the-ranger.Bond4: _______________ does not understand life in the wild, so I will teach them.

PMTTRPG.Settings.itemIcons.name: "Enable Item Icons"
PMTTRPG.Settings.itemIcons.hint: "Enable visual icons for moves, spells, and equipment in character sheets (requires browser reload)."
PMTTRPG.Settings.enableDamageButtons.name: "Enable Damage Buttons"
PMTTRPG.Settings.enableDamageButtons.hint: "Enable damage buttons on chat cards for GM users. Damage will be applied to selected tokens (not targeted tokens) and will be reduced by armor and piercing values per the core rules. Requires reloading the browser to take effect."
PMTTRPG.Settings.xpFormula.name: "XP Formula"
PMTTRPG.Settings.xpFormula.hint: "Enter the XP formula used for leveling up. Available attributes are those that would work in rolls sent to chat, such as (2 * @attributes.level.value) + 10. Default is (@attributes.level.value + 7). To use a fixed XP amount for level up, just enter a number."
PMTTRPG.Settings.advForward.name: "Clear ADV/DIS After Rolls"
PMTTRPG.Settings.advForward.hint: "If enabled, advantage and disadvantage choices on the character sheet will be reset to normal after each roll (similar to Forward)."
PMTTRPG.Settings.disDebility.name: "Debilities Impose Disadvantage"
PMTTRPG.Settings.disDebility.hint: "If enabled, debilities will apply disadvantage on rolls rather than a change to the ability modifier."
PMTTRPG.Settings.coinWeight.name: "Coin weight"
PMTTRPG.Settings.coinWeight.hint: "Number of coins corresponding to one unit of weight, 0 makes coins weightless"

