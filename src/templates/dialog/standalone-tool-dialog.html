<div class="stat-roll-dialog standalone-tool-dialog">
  <form>
    <div class="dialog-header">
      <img class="dialog-summary__icon" src="{{tool.img}}" title="{{tool.name}}" alt="{{tool.name}}" width="44" height="44"/>
      <div class="dialog-header__body">
        <h3>{{tool.name}}</h3>
        <div class="dialog-summary__meta">
          <span class="tag">{{statLabel}} {{actorStat}}</span>
          <span class="tag">{{localize "PMTTRPG.Rank"}} {{tool.rank}}</span>
          <span class="tag">{{localize "PMTTRPG.ToolUses"}}: {{tool.remaining}}</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>{{localize "PMTTRPG.Dialog.standaloneTargetMode"}}</label>
      <div class="standalone-target-modes">
        <label class="checkbox">
          <input type="radio" name="targetMode" value="self" checked />
          <span>{{localize "PMTTRPG.Dialog.standaloneTargetSelf"}} (−{{rankPenalty}} {{localize "PMTTRPG.Rank"}})</span>
        </label>
        <label class="checkbox">
          <input type="radio" name="targetMode" value="willing" />
          <span>{{localize "PMTTRPG.Dialog.standaloneTargetWilling"}} (−{{rankPenalty}} {{localize "PMTTRPG.Rank"}})</span>
        </label>
        <label class="checkbox">
          <input type="radio" name="targetMode" value="unwilling" />
          <span>{{localize "PMTTRPG.Dialog.standaloneTargetUnwilling"}}</span>
        </label>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label for="advantage">{{localize "PMTTRPG.Dialog.rollMode"}}</label>
        <select id="advantage" name="advantage" class="form-control">
          <option value="dis" {{#if (eq rollMode "dis")}}selected{{/if}}>{{localize "PMTTRPG.Disadvantage"}}</option>
          <option value="def" {{#if (eq rollMode "def")}}selected{{/if}}>{{localize "PMTTRPG.Normal"}}</option>
          <option value="adv" {{#if (eq rollMode "adv")}}selected{{/if}}>{{localize "PMTTRPG.Advantage"}}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="modifier">{{localize "PMTTRPG.Dialog.modifier"}}</label>
        <div class="modifier-input">
          <input type="number" id="modifier" name="modifier" class="form-control" value="0" min="-20" max="20" />
          <span class="modifier-hint">{{localize "PMTTRPG.Dialog.modifierHint"}}</span>
        </div>
      </div>
    </div>
  </form>
</div>
