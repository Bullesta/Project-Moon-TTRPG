<div class="resource-group">
  <div class="resource resource--easy-effects">
    <label>{{localize "PMTTRPG.EasyEffectsScript"}}</label>
    <textarea
      name="system.easyEffects"
      rows="12"
      data-dtype="String"
      {{#unless editable}}disabled{{/unless}}
    >{{system.easyEffects}}</textarea>
    {{#if easyEffectsHint}}
    <div class="help-text"><p>{{localize easyEffectsHint}}</p></div>
    {{/if}}
  </div>
</div>
