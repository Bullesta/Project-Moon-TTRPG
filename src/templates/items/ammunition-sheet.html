<div class="{{cssClass}} item-form flexcol">
  <div class="sheet-wrapper flexcol">
    <header class="sheet-header flexrow">
      {{#if isOutdated}}
      <div class="compendium-outdated-banner">
        <span>{{localize "PMTTRPG.OutdatedWarning"}}</span>
        <button type="button" data-action="sync-from-compendium">
          {{localize "PMTTRPG.OutdatedUpdate"}}
        </button>
        <button type="button"
                data-action="dismiss-outdated"
                data-modified-time="{{compendiumModifiedTime}}">
          {{localize "PMTTRPG.OutdatedDismiss"}}
        </button>
      </div>
      {{/if}}
      <div class="cell cell--image">
        <img class="profile-img" src="{{item.img}}" data-action="editImage" data-edit="img" title="{{item.name}}"/>
      </div>
      <div class="header-fields">
          <h1><input name="name" type="text" value="{{item.name}}" placeholder="{{localize "PMTTRPG.Common.Name"}}"/></h1>
      </div>
    </header>

    {{!-- Sheet Tab Navigation --}}
    <nav class="sheet-tabs tabs" data-group="primary">
        <a class="item{{#if (eq activeTab 'description')}} active{{/if}}" data-action="tab" data-group="primary" data-tab="description">{{localize "PMTTRPG.Common.Description"}}</a>
        <a class="item{{#if (eq activeTab 'details')}} active{{/if}}" data-action="tab" data-group="primary" data-tab="details">{{localize "PMTTRPG.Common.Details"}}</a>
    </nav>

    {{!-- Sheet Body --}}
    <section class="sheet-body">

        {{!-- Description Tab --}}
        <div class="tab{{#if (eq activeTab 'description')}} active{{/if}}" data-group="primary" data-tab="description">
            <prose-mirror name="system.description" value="{{system.description}}" toggled {{#unless editable}}disabled{{/unless}}>{{{system.descriptionEnriched}}}</prose-mirror>
        </div>

        {{!-- Details Tab --}}
        <div class="tab{{#if (eq activeTab 'details')}} active{{/if}}" data-group="primary" data-tab="details">
          <div class="resource-group">
            <div class="resource">
              <label>{{localize "PMTTRPG.AmmoType"}}</label>
              <select name="system.ammoType" data-dtype="String">
                {{selectOptions selects.ammoTypes selected=system.ammoType localize=true}}
              </select>
            </div>
            <div class="resource">
              <label>{{localize "PMTTRPG.DamageType"}}</label>
              <select name="system.damageType" data-dtype="String">
                {{selectOptions selects.damageTypes selected=system.damageType localize=true}}
              </select>
            </div>
            <div class="resource">
              <label>{{localize "PMTTRPG.Quantity"}}</label>
              <input type="text" name="system.quantity" value="{{system.quantity}}" data-dtype="Number"/>
            </div>
            <div class="resource">
              <label>{{localize "PMTTRPG.Weight"}}</label>
              <input type="text" name="system.weight" value="{{system.weight}}" data-dtype="Number"/>
            </div>
            <div class="resource">
              <label>{{localize "PMTTRPG.Price"}}</label>
              <input type="text" name="system.price" value="{{system.price}}" data-dtype="Number"/>
            </div>
          </div>
        </div>
    </section>
  </div>
</div>
