  name: ''
  description: >-
    <p dir="ltr">On Hit when the Target has Ruin (before Clash Results are
    applied) roll a D10. If the D10 rolls Equal to or Lower than the
    target&rsquo;s Ruin Number, deal a Devastating Hit and lose all
    Ruin.&nbsp;</p>

    <p><strong>&nbsp;</strong></p>

    <p dir="ltr">If the target has 0 Ruin and gains Ruin their Devastation
    becomes 1, if their Ruin becomes 0 their Devastation is 0. If they would
    gain Ruin and Devastation in the same action, the Ruin is applied first,
    then the Devastation is increased on top of the now present 1
    Devastation.</p>

    <p>&nbsp;</p>
