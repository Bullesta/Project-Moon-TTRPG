  description: >-
    <p dir="ltr">You gain Critical as a part of Poise and other skills. When you
    trigger a Critical Hit you deal 1D10 extra HP Damage per Critical you have
    and lose all Critical.&nbsp;</p>

    <p><strong>&nbsp;</strong></p>

    <p dir="ltr">Critical can interact with Stance augments. Only one Stance can
    be active on the character at any one time, and it costs 1 Reaction to
    activate, deactivate, or swap between stances on your turn.</p>

    <p><strong>&nbsp;</strong></p>

    <p dir="ltr">If you gain Critical, but have no Poise, gain 1 Poise.</p>

    <p>&nbsp;</p>
