  name: ''
  description: >-
    <p dir="ltr">When hit by an Attack, the attacker may choose to proc this
    status. Take SP Damage equal to the number of Sinking stacks, then remove
    all Sinking. This is considered a Sinking Burst for effects that refer to
    it. If this Sinking Burst results in the target&rsquo;s Panic, the attacker
    can choose what Panic type the target enters.</p>

    <p><strong>&nbsp;</strong></p>

    <p dir="ltr">If you do not have SP (this does not count for characters at 0
    SP), take HP Damage instead during a Sinking Burst.</p>

    <p><strong>&nbsp;</strong></p>

    <p dir="ltr">At the end of Round, remove all Sinking.</p>

    <p>&nbsp;</p>
